<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>NewOS - Instalacja</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
}

#setup-surface {
    position: absolute;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: black;
    color: white;
    overflow-y: auto;
}

#setup-surface.white {
    background: #f3f4f6;
    color: #111;
}

#setup-surface.purple {
    background: linear-gradient(135deg, #2d1b69, #a855f7);
    color: white;
    animation: purpleShift 8s ease infinite;
}

@keyframes purpleShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

/* LOGO - TYLKO NA BOOTOWANIU */
#logo {
    text-align: center;
    white-space: nowrap;
    margin-bottom: 30px;
    animation: logoFloat 3s ease-in-out infinite, logoGlow 2s ease-in-out infinite;
}

@keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

@keyframes logoGlow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(168,85,247,.5)); }
    50% { filter: drop-shadow(0 0 40px rgba(168,85,247,.8)); }
}

.metal-nothing {
    font-family: 'Cherry Bomb One', cursive;
    font-size: 4vw;
    animation: glowPulse 3s infinite, textWave 4s ease-in-out infinite;
}

@keyframes textWave {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

.new-os {
    font-size: 4vw;
    font-weight: 300;
    letter-spacing: 2px;
    animation: slideInRight 1s ease-out, pulseText 2s infinite;
}

@keyframes slideInRight {
    from {
        opacity: 0;
        transform: translateX(50px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes pulseText {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}

@keyframes glowPulse {
    50% { text-shadow: 0 0 25px white, 0 0 50px rgba(168,85,247,.5); }
}

.setup-content {
    max-width: 700px;
    width: 90%;
    padding: 40px 0;
    animation: fadeInUp 0.6s ease-out, breathe 4s ease-in-out infinite;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
}

.setup-content h1 {
    font-size: 2.2rem;
    margin-bottom: 20px;
    animation: slideIn 0.5s ease-out, titleGlow 3s infinite;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(-20px) rotate(-2deg);
    }
    to {
        opacity: 1;
        transform: translateX(0) rotate(0);
    }
}

@keyframes titleGlow {
    0%, 100% { text-shadow: 0 0 10px rgba(168,85,247,.3); }
    50% { text-shadow: 0 0 30px rgba(168,85,247,.6), 0 0 50px rgba(168,85,247,.4); }
}

.setup-content h2 {
    font-size: 1.4rem;
    margin: 20px 0 10px;
    animation: fadeIn 0.8s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.setup-options {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin: 20px 0;
}

.opt-card {
    min-width: 140px;
    padding: 20px;
    border-radius: 20px;
    border: 2px solid rgba(128,128,128,.35);
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    animation: cardAppear 0.5s ease-out backwards;
    position: relative;
    overflow: hidden;
}

.opt-card:nth-child(1) { animation-delay: 0.1s; }
.opt-card:nth-child(2) { animation-delay: 0.2s; }
.opt-card:nth-child(3) { animation-delay: 0.3s; }

@keyframes cardAppear {
    from {
        opacity: 0;
        transform: translateY(20px) scale(0.8) rotate(-5deg);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0);
    }
}

.opt-card::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(168,85,247,.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
}

.opt-card:hover::before {
    width: 300px;
    height: 300px;
}

.opt-card:hover {
    border-color: #a855f7;
    background: rgba(168,85,247,.2);
    transform: scale(1.1) translateY(-8px) rotate(2deg);
    box-shadow: 0 15px 40px rgba(168,85,247,.5), 0 0 20px rgba(168,85,247,.3);
}

.opt-card.selected {
    border-color: #a855f7;
    background: rgba(168,85,247,.3);
    box-shadow: 0 0 25px rgba(168,85,247,.6);
    animation: selectedPulse 1.5s infinite;
}

@keyframes selectedPulse {
    0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 25px rgba(168,85,247,.6);
    }
    50% {
        transform: scale(1.05);
        box-shadow: 0 0 40px rgba(168,85,247,.8);
    }
}

.setup-input {
    width: 100%;
    padding: 15px;
    border-radius: 25px;
    border: 2px solid #aaa;
    font-size: 1.05rem;
    margin-bottom: 15px;
    background: rgba(255,255,255,.1);
    color: inherit;
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    animation: inputSlideIn 0.6s ease-out backwards;
}

.setup-input:nth-child(1) { animation-delay: 0.1s; }
.setup-input:nth-child(2) { animation-delay: 0.2s; }
.setup-input:nth-child(3) { animation-delay: 0.3s; }

@keyframes inputSlideIn {
    from {
        opacity: 0;
        transform: translateX(-30px) scale(0.9);
    }
    to {
        opacity: 1;
        transform: translateX(0) scale(1);
    }
}

.setup-input:focus {
    outline: none;
    border-color: #a855f7;
    background: rgba(168,85,247,.15);
    box-shadow: 0 0 20px rgba(168,85,247,.4), inset 0 0 10px rgba(168,85,247,.2);
    transform: scale(1.03);
    animation: inputFocus 0.5s ease-out;
}

@keyframes inputFocus {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1.03); }
}

.setup-btn {
    padding: 15px 40px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #a855f7, #c084fc);
    color: white;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    box-shadow: 0 5px 15px rgba(168,85,247,.3);
    animation: btnAppear 0.7s ease-out, btnFloat 3s ease-in-out infinite;
    position: relative;
    overflow: hidden;
}

@keyframes btnAppear {
    from {
        opacity: 0;
        transform: translateY(20px) scale(0.8);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes btnFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
}

.setup-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255,255,255,.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
}

.setup-btn:hover::before {
    width: 400px;
    height: 400px;
}

.setup-btn:hover {
    transform: scale(1.1) translateY(-5px) rotate(2deg);
    box-shadow: 0 15px 40px rgba(168,85,247,.6), 0 0 30px rgba(168,85,247,.4);
    animation: btnHover 0.3s ease-out;
}

@keyframes btnHover {
    0% { transform: scale(1.1) translateY(-5px) rotate(2deg); }
    50% { transform: scale(1.15) translateY(-7px) rotate(-2deg); }
    100% { transform: scale(1.1) translateY(-5px) rotate(2deg); }
}

.setup-btn:active {
    transform: scale(1.05);
    animation: btnClick 0.2s ease-out;
}

@keyframes btnClick {
    0% { transform: scale(1.1); }
    50% { transform: scale(0.95); }
    100% { transform: scale(1.05); }
}

.setup-link {
    display: inline-block;
    margin-top: 10px;
    color: #38bdf8;
    cursor: pointer;
    text-decoration: underline;
    transition: all 0.3s ease;
    animation: linkAppear 0.8s ease-out backwards;
}

.setup-link:nth-child(1) { animation-delay: 0.2s; }
.setup-link:nth-child(2) { animation-delay: 0.3s; }
.setup-link:nth-child(3) { animation-delay: 0.4s; }

@keyframes linkAppear {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.setup-link:hover {
    color: #0ea5e9;
    transform: scale(1.1) translateX(5px);
    text-shadow: 0 0 10px rgba(56,189,248,.5);
}

/* HYPER ACCOUNT LOGO */
.hyper-logo {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a855f7, #c084fc);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 3.5rem;
    font-weight: 900;
    margin: 0 auto 20px;
    box-shadow: 0 0 40px rgba(168,85,247,.7);
    animation: hyperLogoSpin 4s linear infinite, hyperLogoPulse 2s ease-in-out infinite, hyperLogoFloat 3s ease-in-out infinite;
    position: relative;
}

@keyframes hyperLogoSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes hyperLogoPulse {
    0%, 100% {
        box-shadow: 0 0 40px rgba(168,85,247,.7);
    }
    50% {
        box-shadow: 0 0 60px rgba(168,85,247,.9), 0 0 80px rgba(168,85,247,.5);
    }
}

@keyframes hyperLogoFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(180deg); }
}

.hyper-logo::after {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 3px solid rgba(168,85,247,.5);
    animation: hyperLogoRing 2s ease-out infinite;
}

@keyframes hyperLogoRing {
    0% {
        transform: scale(1);
        opacity: 1;
    }
    100% {
        transform: scale(1.5);
        opacity: 0;
    }
}

.progress-bar {
    width: 100%;
    height: 15px;
    background: rgba(255,255,255,.2);
    border-radius: 30px;
    overflow: hidden;
    box-shadow: inset 0 2px 5px rgba(0,0,0,.3);
    animation: progressBarAppear 0.8s ease-out;
}

@keyframes progressBarAppear {
    from {
        opacity: 0;
        transform: scaleX(0);
    }
    to {
        opacity: 1;
        transform: scaleX(1);
    }
}

.fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, #a855f7, #c084fc, #e9d5ff, #c084fc, #a855f7);
    background-size: 200% 100%;
    border-radius: 30px;
    transition: width 0.5s ease;
    box-shadow: 0 0 15px rgba(168,85,247,.6);
    animation: fillShimmer 2s linear infinite;
}

@keyframes fillShimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
}

.cmd-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 42%;
    background: rgba(0,0,0,.96);
    color: #0f0;
    font-family: 'Courier New', monospace;
    padding: 20px;
    display: none;
    flex-direction: column;
    z-index: 120;
    border-top: 2px solid #0f0;
}

.cmd-overlay.visible {
    display: flex;
    animation: slideUp 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

@keyframes slideUp {
    from {
        transform: translateY(100%);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

.cmd-output {
    flex: 1;
    white-space: pre-wrap;
    text-align: left;
    overflow: auto;
}

.cmd-input-line {
    display: flex;
}

.cmd-input-line span {
    margin-right: 6px;
    animation: cmdPrompt 1s ease-in-out infinite;
}

@keyframes cmdPrompt {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

.cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    color: #0f0;
    outline: none;
    font-family: inherit;
    font-size: 1rem;
}

#lockscreen {
    position: absolute;
    inset: 0;
    z-index: 250;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
}

#lockscreen.visible {
    display: flex;
    animation: lockscreenAppear 0.8s ease-out;
}

@keyframes lockscreenAppear {
    from {
        opacity: 0;
        transform: scale(1.1);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

.lock-time {
    font-size: 6rem;
    font-weight: 200;
    animation: lockTimeGlow 3s ease-in-out infinite;
}

@keyframes lockTimeGlow {
    0%, 100% { text-shadow: 0 0 20px rgba(255,255,255,.3); }
    50% { text-shadow: 0 0 40px rgba(255,255,255,.6), 0 0 60px rgba(168,85,247,.4); }
}

.lock-date {
    font-size: 1.2rem;
    opacity: .75;
    margin: 10px 0 35px;
}

.lock-input {
    width: 260px;
    padding: 12px;
    border-radius: 25px;
    border: 2px solid rgba(255,255,255,.3);
    background: rgba(255,255,255,.12);
    color: white;
    text-align: center;
    transition: all 0.3s ease;
}

.lock-input:focus {
    border-color: #a855f7;
    box-shadow: 0 0 20px rgba(168,85,247,.5);
    transform: scale(1.05);
}

@keyframes nextPulse {
    50% { box-shadow: 0 0 60px #a855f7; }
}

/* ANIMATED BACKGROUND PARTICLES */
.particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 1;
}

.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(168,85,247,.6);
    border-radius: 50%;
    animation: particleFloat 15s linear infinite;
}

@keyframes particleFloat {
    0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    90% {
        opacity: 1;
    }
    100% {
        transform: translateY(-100px) translateX(100px);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div id="setup-surface">
    <div class="particles" id="particles"></div>
    
    <!-- LOGO - WIDOCZNE TYLKO NA BOOTOWANIU -->
    <div id="logo" style="display:none">
        <span class="metal-nothing">Metal Nothing</span>
        <span class="new-os">+ NewOS</span>
    </div>

    <div class="setup-content" id="setup-content"></div>

    <div class="cmd-overlay" id="cmd-overlay">
        <div class="cmd-output" id="cmd-output">NewOS Setup CMD [Wersja 7.0]
(c) Metal Nothing Corporation.

</div>
        <div class="cmd-input-line">
            <span>C:\Setup></span>
            <input id="cmd-input" class="cmd-input" type="text">
        </div>
    </div>
</div>

<div id="lockscreen">
    <div class="lock-time" id="lock-time">12:00</div>
    <div class="lock-date" id="lock-date"></div>
    <input id="lock-input" class="lock-input" type="password" placeholder="Hasło">
</div>

<script>
const setupSurface = document.getElementById("setup-surface");
const setupContent = document.getElementById("setup-content");
const cmdOverlay = document.getElementById("cmd-overlay");
const cmdOutput = document.getElementById("cmd-output");
const cmdInput = document.getElementById("cmd-input");
const lockscreenEl = document.getElementById("lockscreen");
const logoEl = document.getElementById("logo");
const particlesEl = document.getElementById("particles");

let osData = {
    theme: "ciemny",
    user: "",
    pass: "",
    pcName: "NEW-PC",
    hyperLogin: "",
    hyperPass: ""
};

let cmdActive = false;

const wait = ms => new Promise(resolve => setTimeout(resolve, ms));

// Tworzenie cząsteczek
function createParticles() {
    for (let i = 0; i < 50; i++) {
        const particle = document.createElement("div");
        particle.className = "particle";
        particle.style.left = Math.random() * 100 + "%";
        particle.style.animationDelay = Math.random() * 15 + "s";
        particle.style.animationDuration = (Math.random() * 10 + 10) + "s";
        particlesEl.appendChild(particle);
    }
}

createParticles();

window.addEventListener("storage", (e) => {
    if (
        e.key === "onl_key_ready" ||
        e.key === "onl_key_plan" ||
        e.key === "onl_sub_key"
    ) {
        if (typeof window.refreshKeyAcceptButton === "function") {
            window.refreshKeyAcceptButton();
        }
    }
});

async function startSetupSequence() {
    setupSurface.style.background = "#000";

    // LOGO WIDOCZNE NA BOOTOWANIU
    logoEl.style.display = "block";

    setupContent.innerHTML = `
        <h1 style="color:#fff;font-size:1.6rem;animation:fadeInUp 0.8s ease-out">
            Uruchamianie ponownie<br>
            stosowanie pakietu...
        </h1>
    `;

    await wait(3000);

    setupSurface.style.background = "#f3f4f6";
    setupSurface.className = "white";

    // UKRYJ LOGO PO BOOTOWANIU
    logoEl.style.display = "none";

    setupContent.innerHTML = `
        <h1 style="color:#111">Wybierz Motyw</h1>
        <div class="setup-options">
            <div class="opt-card" data-theme="ciemny" style="background:#222;color:#fff">🌑 Ciemny</div>
            <div class="opt-card" data-theme="biały" style="background:#fff;color:#111">☀️ Biały</div>
            <div class="opt-card" data-theme="fioletowy" style="background:#6b2fb5;color:#fff">🔮 Fioletowy</div>
        </div>
    `;

    document.querySelectorAll(".opt-card").forEach(card => {
        card.addEventListener("click", () => {
            osData.theme = card.dataset.theme;

            document.querySelectorAll(".opt-card").forEach(c => c.classList.remove("selected"));
            card.classList.add("selected");

            setTimeout(() => showStep("partition"), 500);
        });
    });
}

function applyTheme() {
    if (osData.theme === "biały") {
        setupSurface.className = "white";
        setupSurface.style.background = "#f3f4f6";
        return "#111";
    }

    if (osData.theme === "fioletowy") {
        setupSurface.className = "purple";
        setupSurface.style.background = "linear-gradient(135deg,#2d1b69,#a855f7)";
        return "#fff";
    }

    setupSurface.className = "";
    setupSurface.style.background = "#111";
    return "#fff";
}

function showStep(step) {
    cmdOverlay.classList.remove("visible");
    cmdActive = false;

    const color = applyTheme();

    if (step === "partition") {
        setupContent.innerHTML = `
            <h1 style="color:${color}">Wybierz partycję do zainstalowania</h1>

            <div class="setup-options">
                <div class="opt-card selected">💾 Dysk 0<br><small>Partycja 1 — 500GB</small></div>
                <div class="opt-card">💾 Dysk 1<br><small>Partycja 2 — 1TB</small></div>
            </div>

            <button class="setup-btn" onclick="showStep('key')">Dalej</button>
        `;
    }

    if (step === "key") {
        const chosenPlan = localStorage.getItem("onl_plan") || "Normal";

        setupContent.innerHTML = `
            <h1 style="color:${color}">Kod Bezpieczeństwa Subskrypcji</h1>

            <p style="opacity:.75;margin-bottom:15px;line-height:1.5">
                Przejdź do banku ONL i wykonaj:
                <br><br>
                <strong>Klucze → NewOS → Subskrypcyjne → BootOS 3</strong>
                <br>
                Następnie wybierz wersję:
                <strong>${chosenPlan}</strong>.
            </p>

            <div
                id="key-wait-box"
                style="
                    padding:18px;
                    border-radius:20px;
                    background:rgba(168,85,247,.15);
                    border:1px solid rgba(168,85,247,.45);
                    margin-bottom:18px;
                    animation:fadeInUp 0.6s ease-out;
                "
            >
                ⏳ Oczekiwanie na zaakceptowanie klucza w banku...
            </div>

            <button
                id="accept-key-btn"
                class="setup-btn"
                style="display:none"
            >
                Zaakceptuj
            </button>

            <div id="paste-key-area" style="display:none;margin-top:25px">
                <p style="opacity:.75;margin-bottom:12px">
                    Skopiuj klucz z banku i wklej go tutaj:
                </p>

                <input
                    id="sub-key-input"
                    class="setup-input"
                    placeholder="Wklej klucz subskrypcji"
                >

                <button id="decrypt-btn" class="setup-btn">
                    Odszyfruj
                </button>
            </div>
        `;

        const acceptBtn = document.getElementById("accept-key-btn");
        const pasteArea = document.getElementById("paste-key-area");
        const waitBox = document.getElementById("key-wait-box");

        function refreshAcceptButton() {
            const keyReady = localStorage.getItem("onl_key_ready") === "true";
            const keyPlan = localStorage.getItem("onl_key_plan");
            const bankKey = localStorage.getItem("onl_sub_key");

            if (keyReady && keyPlan === chosenPlan && bankKey) {
                waitBox.innerHTML = `
                    ✅ Bank ONL przygotował klucz dla wersji:
                    <strong>${keyPlan}</strong>.
                    <br>
                    Kliknij „Zaakceptuj", potem wklej klucz.
                `;

                acceptBtn.style.display = "inline-block";
            }
        }

        window.refreshKeyAcceptButton = refreshAcceptButton;
        refreshAcceptButton();

        acceptBtn.addEventListener("click", () => {
            acceptBtn.style.display = "none";
            pasteArea.style.display = "block";
        });

        document.getElementById("decrypt-btn").addEventListener("click", async () => {
            const typedKey = document.getElementById("sub-key-input").value.trim();
            const bankKey = localStorage.getItem("onl_sub_key");

            if (!typedKey) {
                alert("Wklej klucz subskrypcji.");
                return;
            }

            if (!bankKey) {
                alert("Bank jeszcze nie przygotował klucza.");
                return;
            }

            if (typedKey !== bankKey) {
                alert("Ten klucz jest niepoprawny albo nie pasuje do subskrypcji.");
                return;
            }

            setupSurface.className = "";
            setupSurface.style.background = "#000";

            // POKAŻ LOGO PONOWNIE PODCZAS ODSZYFROWYWANIA
            logoEl.style.display = "block";

            setupContent.innerHTML = `
                <h1 style="color:#a855f7">Odszyfrowywanie...</h1>
            `;

            await wait(4000);

            setupContent.innerHTML = "";
            setupSurface.style.background = "#000";

            await wait(7000);

            // UKRYJ LOGO PRZED NASTĘPNYM KROKIEM
            logoEl.style.display = "none";

            showStep("locale");
        });
    }

    if (step === "locale") {
        setupContent.innerHTML = `
            <h1 style="color:${color}">Kraj i język klawiatury</h1>

            <select class="setup-input">
                <option>Polska</option>
                <option>USA</option>
                <option>Niemcy</option>
                <option>Ukraina</option>
            </select>

            <select class="setup-input">
                <option>Polski programisty</option>
                <option>English US</option>
                <option>Deutsch</option>
            </select>

            <button class="setup-btn" onclick="showStep('wifi')">Dalej</button>
        `;
    }

    if (step === "wifi") {
        setupContent.innerHTML = `
            <h1 style="color:${color}">Połącz z WiFi</h1>

            <p style="opacity:.75;margin-bottom:15px">
                Naciśnij <strong>F10</strong>, aby otworzyć CMD.
                <br>
                Komenda: <strong>wifi services off</strong> pomija WiFi.
            </p>

            <div class="setup-options">
                <div class="opt-card">📶 HomeNet</div>
                <div class="opt-card">📶 5G-Network</div>
                <div class="opt-card">➕ Dodaj WiFi</div>
            </div>

            <input class="setup-input" placeholder="Nazwa WiFi">
            <input class="setup-input" type="password" placeholder="Hasło WiFi">

            <button class="setup-btn" onclick="showStep('hyper')">Dalej</button>
        `;
    }

    if (step === "hyper") {
        setupContent.innerHTML = `
            <div class="hyper-logo">H</div>
            <h1 style="color:${color}">Hyper Account</h1>

            <input id="hyper-login" class="setup-input" placeholder="Login">
            <input id="hyper-pass" class="setup-input" type="password" placeholder="Hasło">

            <button class="setup-btn" onclick="validateHyper()">Zaloguj</button>
            <br>

            <span class="setup-link">Nie pamiętam hasła</span><br>
            <span class="setup-link" onclick="showStep('user')">Zarejestruj, jeśli nie masz konta</span><br>
            <span class="setup-link" style="color:#fbbf24" onclick="showStep('user')">Login Admin</span>
        `;
    }

    if (step === "user") {
        setupContent.innerHTML = `
            <h1 style="color:${color}">Nazwa Komputera</h1>
            <input id="pc-name" class="setup-input" placeholder="Nazwa komputera">

            <h2 style="color:${color}">Nazwa Użytkownika</h2>
            <input id="user-name" class="setup-input" placeholder="Nazwa użytkownika">

            <h2 style="color:${color}">Hasło</h2>
            <input id="user-pass" class="setup-input" type="password" placeholder="Zostaw puste, aby pominąć">

            <button class="setup-btn" onclick="saveUser()">Dalej</button>
        `;
    }

    if (step === "updates") {
        setupContent.innerHTML = `
            <h1 style="color:${color}">Sprawdzanie aktualizacji...</h1>
            <p style="opacity:.75;margin-bottom:20px">Pobieranie najnowszych poprawek bezpieczeństwa</p>
            
            <div class="progress-bar">
                <div id="updates-fill" class="fill"></div>
            </div>
            <p id="updates-status" style="margin-top:15px;opacity:.7">Przygotowywanie...</p>
        `;

        runUpdates();
    }

    if (step === "personalization") {
        setupContent.innerHTML = `
            <h1 style="color:${color}">Personalizacja</h1>
            
            <div class="setup-options">
                <div class="opt-card" data-personal="gaming">🎮 Gaming</div>
                <div class="opt-card" data-personal="work">💼 Praca</div>
                <div class="opt-card" data-personal="creative">🎨 Kreatywny</div>
            </div>

            <button class="setup-btn" onclick="showStep('install')">Dalej</button>
        `;

        document.querySelectorAll(".opt-card").forEach(card => {
            card.addEventListener("click", () => {
                document.querySelectorAll(".opt-card").forEach(c => c.classList.remove("selected"));
                card.classList.add("selected");
                osData.personalization = card.dataset.personal;
            });
        });
    }

    if (step === "install") {
        setupContent.innerHTML = `
            <h1 style="color:${color}">Instalowanie...</h1>

            <p id="install-status">Instalowanie Systemu</p>

            <div class="progress-bar">
                <div id="install-fill" class="fill"></div>
            </div>
        `;

        runInstall();
    }
}

function validateHyper() {
    const login = document.getElementById("hyper-login").value.trim();
    const pass = document.getElementById("hyper-pass").value.trim();

    if (!login) {
        alert("Wpisz login Hyper Account!");
        return;
    }

    if (!pass) {
        alert("Wpisz hasło Hyper Account!");
        return;
    }

    if (login.length < 3) {
        alert("Login musi mieć minimum 3 znaki!");
        return;
    }

    if (pass.length < 4) {
        alert("Hasło musi mieć minimum 4 znaki!");
        return;
    }

    osData.hyperLogin = login;
    osData.hyperPass = pass;

    showStep("user");
}

function saveUser() {
    const pcName = document.getElementById("pc-name").value.trim();
    const userName = document.getElementById("user-name").value.trim();
    const userPass = document.getElementById("user-pass").value;

    if (!pcName) {
        alert("Wpisz nazwę komputera!");
        return;
    }

    if (!userName) {
        alert("Wpisz nazwę użytkownika!");
        return;
    }

    if (pcName.length < 3) {
        alert("Nazwa komputera musi mieć minimum 3 znaki!");
        return;
    }

    if (userName.length < 2) {
        alert("Nazwa użytkownika musi mieć minimum 2 znaki!");
        return;
    }

    osData.pcName = pcName;
    osData.user = userName;
    osData.pass = userPass;

    showStep("updates");
}

async function runUpdates() {
    const fill = document.getElementById("updates-fill");
    const status = document.getElementById("updates-status");

    const steps = [
        ["Sprawdzanie serwera...", 20],
        ["Pobieranie listy aktualizacji...", 40],
        ["Pobieranie poprawek bezpieczeństwa...", 70],
        ["Instalowanie aktualizacji...", 90],
        ["Zakończono", 100]
    ];

    for (const [text, percent] of steps) {
        status.textContent = text;
        fill.style.width = percent + "%";
        await wait(1500);
    }

    await wait(1000);
    showStep("personalization");
}

async function runInstall() {
    const fill = document.getElementById("install-fill");
    const status = document.getElementById("install-status");

    const steps = [
        ["Instalowanie Systemu", 20],
        ["Konfiguracja sterowników", 40],
        ["Instalowanie aktualizacji", 60],
        ["Optymalizacja systemu", 80],
        ["Finalizacja instalacji", 95],
        ["Koniec", 100]
    ];

    for (const [text, percent] of steps) {
        status.textContent = text;
        fill.style.width = percent + "%";
        await wait(2000);
    }

    setupSurface.className = "";
    setupSurface.style.background = "#000";
    setupContent.innerHTML = "";

    // POKAŻ LOGO NA KOŃCU INSTALACJI
    logoEl.style.display = "block";

    await wait(7000);

    setupSurface.style.display = "none";

    bootAfterInstall();
}

function bootAfterInstall() {
    if (osData.pass) {
        lockscreenEl.classList.add("visible");

        updateLockClock();
        setInterval(updateLockClock, 1000);

        const input = document.getElementById("lock-input");
        input.focus();

        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && input.value === osData.pass) {
                lockscreenEl.classList.remove("visible");
                goToDesktop();
            }
        });
    } else {
        goToDesktop();
    }
}

function updateLockClock() {
    const now = new Date();

    document.getElementById("lock-time").textContent =
        now.toLocaleTimeString("pl-PL", {
            hour: "2-digit",
            minute: "2-digit"
        });

    document.getElementById("lock-date").textContent =
        now.toLocaleDateString("pl-PL", {
            weekday: "long",
            day: "numeric",
            month: "long"
        });
}

function goToDesktop() {
    localStorage.setItem("newos_installed", "true");
    localStorage.setItem("newos_user", osData.user || "User");
    localStorage.setItem("newos_pc", osData.pcName || "NEW-PC");
    localStorage.setItem("newos_theme", osData.theme || "ciemny");
    localStorage.setItem("newos_plan", localStorage.getItem("onl_plan") || "Normal");
    localStorage.setItem("newos_personalization", osData.personalization || "gaming");

    window.location.href = "pulpitdeluxe.html";
}

window.addEventListener("keydown", async (e) => {
    if (e.key === "F10" && !cmdActive) {
        e.preventDefault();
        cmdActive = true;
        cmdOverlay.classList.add("visible");
        cmdInput.focus();
    }
});

cmdInput.addEventListener("keydown", async (e) => {
    if (e.key === "Enter") {
        const value = cmdInput.value.trim();
        cmdOutput.textContent += `C:\\Setup>${value}\n`;
        cmdInput.value = "";

        if (value.toLowerCase() === "wifi services off") {
            cmdOutput.textContent += "Wyłączanie usług WiFi...\n";
            await wait(1000);
            cmdOutput.textContent += "Usługi WiFi wyłączone pomyślnie.\n";
            await wait(1000);
            cmdOutput.textContent += "Pomijanie konfiguracji WiFi...\n";
            await wait(1500);

            cmdOverlay.classList.remove("visible");
            cmdActive = false;

            setupSurface.style.background = "#000";
            
            // POKAŻ LOGO
            logoEl.style.display = "block";

            setupContent.innerHTML = `
                <h1 style="font-family:'Cherry Bomb One',cursive;color:#fff">
                    Metal Nothing + NewOS
                </h1>
            `;

            await wait(3000);

            // UKRYJ LOGO
            logoEl.style.display = "none";

            showStep("hyper");
        }
    }
});

startSetupSequence();
</script>
</body>
</html>
