<script>
function loadState(){
    let accounts=JSON.parse(localStorage.getItem("bank_accounts") || "null");

    if(!accounts){
        accounts=[
            {
                id:"acc1",
                name:"Konto główne",
                num:"2077",
                balance:1000,
                loan:0,
                savings:[],
                transactions:[]
            }
        ];
    }

    return {
        accounts,
        activeId:localStorage.getItem("bank_active") || accounts[0].id,
        lastBonus:localStorage.getItem("bank_lastbonus") || null
    };
}

function saveState(){
    localStorage.setItem("bank_accounts",JSON.stringify(state.accounts));
    localStorage.setItem("bank_active",state.activeId);

    if(state.lastBonus){
        localStorage.setItem("bank_lastbonus",state.lastBonus);
    }
}

let state=loadState();

function activeAcc(){
    return state.accounts.find(a=>a.id===state.activeId) || state.accounts[0];
}

function addTx(account,title,amount,type,icon){
    account.transactions.push({
        title,
        amount,
        type,
        icon,
        date:new Date().toLocaleString("pl-PL")
    });
}

function openModal(id){
    document.getElementById(id).classList.add("visible");
}

function closeModal(id){
    document.getElementById(id).classList.remove("visible");
}

function toast(text,error=false){
    const t=document.getElementById("toast");
    t.textContent=text;
    t.className="toast visible"+(error ? " error" : "");

    setTimeout(()=>{
        t.className="toast";
    },2600);
}
    function render(){
    const switcher=document.getElementById("accounts-switcher");

    switcher.innerHTML=state.accounts.map(account=>`
        <div class="account-tab ${account.id===state.activeId ? "active" : ""}" data-id="${account.id}">
            <div class="a-name">${account.name}</div>
            <div class="a-num">•••• ${account.num}</div>
            <div class="a-balance">$${account.balance.toFixed(2)}</div>
        </div>
    `).join("") + `<div class="account-tab add-new" id="add-account">＋</div>`;

    switcher.querySelectorAll(".account-tab[data-id]").forEach(tab=>{
        tab.addEventListener("click",()=>{
            state.activeId=tab.dataset.id;
            saveState();
            render();
        });
    });

    document.getElementById("add-account").addEventListener("click",()=>{
        document.getElementById("newaccount-name").value="";
        openModal("modal-newaccount");
    });

    const account=activeAcc();

    document.getElementById("balance-display").textContent="$"+account.balance.toFixed(2);
    document.getElementById("card-num").textContent="•••• •••• •••• "+account.num;
    document.getElementById("loan-display").textContent=
        account.loan>0 ? "⚠️ Do spłaty pożyczki: $"+account.loan.toFixed(2) : "";

    const card=document.getElementById("balance-card");
    card.className="balance-card";

    const index=state.accounts.indexOf(account);
    if(index===1)card.classList.add("gold");
    if(index===2)card.classList.add("green");

    const tx=document.getElementById("transactions");

    if(!account.transactions.length){
        tx.innerHTML=`<div class="empty">Brak transakcji</div>`;
    }else{
        tx.innerHTML=account.transactions.slice().reverse().map(t=>`
            <div class="transaction">
                <div class="t-left">
                    <div class="t-icon ${t.type}">${t.icon}</div>
                    <div>
                        <div class="t-title">${t.title}</div>
                        <div class="t-date">${t.date}</div>
                    </div>
                </div>
                <div class="t-amount ${t.type}">
                    ${t.type==="in" ? "+" : "-"}$${Math.abs(t.amount).toFixed(2)}
                </div>
            </div>
        `).join("");
    }

    checkBonus();
    checkSavings();
}
    let amountMode="deposit";

document.getElementById("btn-deposit").addEventListener("click",()=>{
    amountMode="deposit";
    document.getElementById("amount-title").textContent="💰 Doładuj";
    document.getElementById("amount-input").value="";
    openModal("modal-amount");
});

document.getElementById("btn-withdraw").addEventListener("click",()=>{
    amountMode="withdraw";
    document.getElementById("amount-title").textContent="💸 Wypłać";
    document.getElementById("amount-input").value="";
    openModal("modal-amount");
});

document.getElementById("amount-confirm").addEventListener("click",()=>{
    const account=activeAcc();
    const value=parseFloat(document.getElementById("amount-input").value);

    if(!value || value<=0){
        toast("Podaj poprawną kwotę.",true);
        return;
    }

    if(amountMode==="deposit"){
        account.balance+=value;
        addTx(account,"Doładowanie",value,"in","💰");
    }else{
        if(value>account.balance){
            toast("Za mało środków.",true);
            return;
        }

        account.balance-=value;
        addTx(account,"Wypłata",value,"out","💸");
    }

    saveState();
    render();
    closeModal("modal-amount");
});

document.getElementById("btn-transfer").addEventListener("click",()=>{
    const otherAccounts=state.accounts.filter(a=>a.id!==state.activeId);

    document.getElementById("transfer-target").innerHTML=
        otherAccounts.map(a=>`<option value="${a.id}">${a.name} — •••• ${a.num}</option>`).join("")
        + `<option value="external">Konto zewnętrzne — •••• 2137</option>`;

    document.getElementById("transfer-amount").value="";
    document.getElementById("transfer-title").value="";
    openModal("modal-transfer");
});

document.getElementById("transfer-confirm").addEventListener("click",()=>{
    const account=activeAcc();
    const value=parseFloat(document.getElementById("transfer-amount").value);
    const targetId=document.getElementById("transfer-target").value;
    const title=document.getElementById("transfer-title").value || "Przelew";

    if(!value || value<=0){
        toast("Podaj poprawną kwotę.",true);
        return;
    }

    if(value>account.balance){
        toast("Za mało środków.",true);
        return;
    }

    account.balance-=value;
    addTx(account,title+" →",value,"out","💱");

    if(targetId!=="external"){
        const target=state.accounts.find(a=>a.id===targetId);
        target.balance+=value;
        addTx(target,title+" ←",value,"in","💱");
    }

    saveState();
    render();
    closeModal("modal-transfer");
});
    let selectedSaving=null;

document.getElementById("btn-savings").addEventListener("click",()=>{
    selectedSaving=null;

    document.querySelectorAll("#savings-options .opt-item").forEach(item=>{
        item.classList.remove("selected");
    });

    document.getElementById("savings-amount").value="";
    openModal("modal-savings");
});

document.querySelectorAll("#savings-options .opt-item").forEach(item=>{
    item.addEventListener("click",()=>{
        document.querySelectorAll("#savings-options .opt-item").forEach(i=>i.classList.remove("selected"));
        item.classList.add("selected");

        selectedSaving={
            rate:+item.dataset.rate,
            time:+item.dataset.time
        };
    });
});

document.getElementById("savings-confirm").addEventListener("click",()=>{
    const account=activeAcc();
    const value=parseFloat(document.getElementById("savings-amount").value);

    if(!selectedSaving || !value || value<=0){
        toast("Wybierz lokatę i kwotę.",true);
        return;
    }

    if(value>account.balance){
        toast("Za mało środków.",true);
        return;
    }

    account.balance-=value;

    account.savings.push({
        amount:value,
        rate:selectedSaving.rate,
        time:selectedSaving.time,
        start:Date.now()
    });

    addTx(account,"Założenie lokaty",value,"out","📈");
    saveState();
    render();
    closeModal("modal-savings");
});

let selectedLoan=null;

document.getElementById("btn-loan").addEventListener("click",()=>{
    selectedLoan=null;

    document.querySelectorAll("#loan-options .opt-item").forEach(item=>{
        item.classList.remove("selected");
    });

    openModal("modal-loan");
});

document.querySelectorAll("#loan-options .opt-item").forEach(item=>{
    item.addEventListener("click",()=>{
        document.querySelectorAll("#loan-options .opt-item").forEach(i=>i.classList.remove("selected"));
        item.classList.add("selected");
        selectedLoan=+item.dataset.loan;
    });
});

document.getElementById("loan-confirm").addEventListener("click",()=>{
    const account=activeAcc();

    if(!selectedLoan){
        toast("Wybierz kwotę pożyczki.",true);
        return;
    }

    if(account.loan>0){
        toast("Najpierw spłać obecną pożyczkę.",true);
        return;
    }

    account.balance+=selectedLoan;
    account.loan=selectedLoan*1.1;

    addTx(account,"Pożyczka",selectedLoan,"in","🏦");

    saveState();
    render();
    closeModal("modal-loan");
});

document.getElementById("btn-repay").addEventListener("click",()=>{
    const account=activeAcc();

    if(account.loan<=0){
        toast("Nie masz pożyczki.",true);
        return;
    }

    if(account.balance<account.loan){
        toast("Za mało środków na spłatę.",true);
        return;
    }

    const amount=account.loan;
    account.balance-=amount;
    account.loan=0;

    addTx(account,"Spłata pożyczki",amount,"out","✅");

    saveState();
    render();
});

document.getElementById("newaccount-confirm").addEventListener("click",()=>{
    const name=document.getElementById("newaccount-name").value.trim();

    if(!name){
        toast("Podaj nazwę konta.",true);
        return;
    }

    if(state.accounts.length>=4){
        toast("Maksymalnie 4 konta.",true);
        return;
    }

    const id="acc"+Date.now();

    state.accounts.push({
        id,
        name,
        num:String(Math.floor(1000+Math.random()*9000)),
        balance:0,
        loan:0,
        savings:[],
        transactions:[]
    });

    state.activeId=id;

    saveState();
    render();
    closeModal("modal-newaccount");
});

document.getElementById("btn-reset").addEventListener("click",()=>{
    if(confirm("Zresetować bank?")){
        localStorage.removeItem("bank_accounts");
        localStorage.removeItem("bank_active");
        localStorage.removeItem("bank_lastbonus");
        state=loadState();
        render();
    }
});
    function generateKey(prefix){
    return prefix+"-"+
        Math.random().toString(36).substring(2,10).toUpperCase()+"-"+
        Math.random().toString(36).substring(2,6).toUpperCase();
}

document.getElementById("btn-keys").addEventListener("click",()=>{
    openModal("modal-keys");
    renderKeys("newos");
});

document.querySelectorAll(".key-tab").forEach(tab=>{
    tab.addEventListener("click",()=>{
        document.querySelectorAll(".key-tab").forEach(t=>t.classList.remove("active"));
        tab.classList.add("active");
        renderKeys(tab.dataset.tab);
    });
});

function renderKeys(tab){
    const content=document.getElementById("keys-content");

    if(tab==="newos"){
        let key=localStorage.getItem("onl_newos_key") || generateKey("NOS");
        localStorage.setItem("onl_newos_key", key);
        
        content.innerHTML=`
            <p style="opacity:.75">Klucz systemu NewOS</p>
            <div class="key-box" id="key-val">${key}</div>
            <button class="copy-btn" onclick="copyKey()">Kopiuj klucz</button>
        `;
    }

    if(tab==="sub"){
        let subKey=localStorage.getItem("onl_sub_key") || generateKey("SUB");
        localStorage.setItem("onl_sub_key",subKey);

        content.innerHTML=`
            <p style="opacity:.75">Klucz subskrypcji</p>
            <div class="key-box" id="key-val">${subKey}</div>
            <button class="copy-btn" onclick="copyKey()">Kopiuj klucz</button>
        `;
    }

    if(tab==="boot"){
        content.innerHTML=`
            <p style="opacity:.75; margin-bottom:15px">Wybierz plan subskrypcji BootOS 3:</p>
            <div class="opt-list" id="boot-options">
                <div class="opt-item" data-plan="Basic"><span class="o-amount">Basic</span></div>
                <div class="opt-item" data-plan="Pro"><span class="o-amount">Pro</span></div>
                <div class="opt-item" data-plan="Ultra"><span class="o-amount">Ultra</span></div>
            </div>
            <div id="boot-key-result"></div>
        `;

        document.querySelectorAll("#boot-options .opt-item").forEach(item=>{
            item.addEventListener("click",()=>{
                document.querySelectorAll("#boot-options .opt-item").forEach(i=>i.classList.remove("selected"));
                item.classList.add("selected");
                
                const plan=item.dataset.plan;
                const keyId="onl_boot_key_"+plan;
                let bootKey=localStorage.getItem(keyId) || generateKey("BOOT3-"+plan.toUpperCase());
                localStorage.setItem(keyId, bootKey);

                document.getElementById("boot-key-result").innerHTML=`
                    <p style="opacity:.75; margin-top:15px">Klucz dla planu ${plan}:</p>
                    <div class="key-box" id="key-val">${bootKey}</div>
                    <button class="copy-btn" onclick="copyKey()">Kopiuj klucz</button>
                `;
            });
        });
    }
}

function copyKey(){
    const key=document.getElementById("key-val").textContent;

    navigator.clipboard.writeText(key)
        .then(()=>toast("Klucz skopiowany."))
        .catch(()=>prompt("Skopiuj ręcznie:",key));
}
    const pendingPlan=localStorage.getItem("onl_plan");
const pendingPrice=localStorage.getItem("onl_price");
const pendingCode=localStorage.getItem("onl_code");

if(pendingCode){
    document.getElementById("client-name").textContent=pendingCode;
}

const hasPendingPayment=
    pendingPlan &&
    pendingPrice &&
    localStorage.getItem("onl_paid")!=="true";

if(hasPendingPayment){
    document.getElementById("payment-alert").classList.add("visible");
    document.getElementById("payment-alert-text").textContent=
        pendingPlan+" — $"+pendingPrice;
}

document.getElementById("open-payment").addEventListener("click",()=>{
    const account=activeAcc();

    document.getElementById("pay-plan").textContent=pendingPlan || "—";
    document.getElementById("pay-amount").textContent="$"+(pendingPrice || "0");
    document.getElementById("pay-account").textContent=account.name;
    document.getElementById("pay-balance").textContent="$"+account.balance.toFixed(2);

    openModal("modal-payment");
});

document.getElementById("pay-confirm").addEventListener("click",()=>{
    const account=activeAcc();
    const price=parseFloat(pendingPrice || "0");
    const plan=pendingPlan || "Normal";

    if(!price || price<=0){
        toast("Brak danych płatności.",true);
        return;
    }

    if(account.balance<price){
        toast("Za mało środków. Doładuj konto albo weź pożyczkę.",true);
        closeModal("modal-payment");
        return;
    }

    account.balance-=price;
    addTx(account,"NewOS: "+plan,price,"out","💳");

    let subKey=localStorage.getItem("onl_sub_key");

    if(!subKey){
        subKey=generateKey("SUB");
        localStorage.setItem("onl_sub_key",subKey);
    }

    saveState();
    render();

    localStorage.setItem("onl_rejected","false");
    localStorage.setItem("onl_paid","true");

    closeModal("modal-payment");

    const alert=document.getElementById("payment-alert");
    if(alert)alert.classList.remove("visible");
    
    toast("Płatność zatwierdzona! Klucz w zakładce Klucze.");
});

document.getElementById("pay-reject").addEventListener("click",()=>{
    localStorage.setItem("onl_rejected","true");
    localStorage.removeItem("onl_paid");
    closeModal("modal-payment");
    toast("Płatność odrzucona.");
});

function checkBonus(){
    const today=new Date().toDateString();
    document.getElementById("bonus-banner").style.display=
        state.lastBonus===today ? "none" : "flex";
}

document.getElementById("claim-bonus").addEventListener("click",()=>{
    const account=activeAcc();

    account.balance+=100;
    addTx(account,"Codzienny bonus",100,"in","🎁");

    state.lastBonus=new Date().toDateString();

    saveState();
    render();
});

// Sprawdzanie lokat
function checkSavings(){
    state.accounts.forEach(acc=>{
        if(acc.savings && acc.savings.length>0){
            acc.savings=acc.savings.filter(s=>{
                if(Date.now() - s.start >= s.time * 1000){
                    const profit=s.amount * (s.rate / 100);
                    acc.balance+=s.amount + profit;
                    addTx(acc, `Zwrot z lokaty (+${s.rate}%)`, s.amount + profit, "in", "📈");
                    saveState();
                    return false;
                }
                return true;
            });
        }
    });
}

render();
</script>
