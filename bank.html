<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Bank ONL</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #001f3f 0%, #003366 50%, #004080 100%);
        display: flex; justify-content: center; align-items: center;
        min-height: 100vh; color: #fff;
    }
    .bank-card {
        background: rgba(255,255,255,0.1); backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.2); border-radius: 24px;
        padding: 45px; max-width: 480px; width: 90%; text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .bank-logo {
        font-size: 2.2rem; font-weight: 800; margin-bottom: 5px;
        letter-spacing: 1px;
    }
    .bank-logo span { color: #38bdf8; }
    .bank-sub { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 30px; }
    .detail-row {
        display: flex; justify-content: space-between; padding: 14px 0;
        border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 1rem;
    }
    .detail-row .label { color: rgba(255,255,255,0.6); }
    .detail-row .value { font-weight: 600; }
    .amount { font-size: 2.5rem; font-weight: 800; color: #38bdf8; margin: 25px 0; }
    .question { font-size: 1.15rem; margin-bottom: 25px; }
    .btn-row { display: flex; gap: 15px; }
    button {
        flex: 1; padding: 16px; border: none; border-radius: 14px;
        font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease;
    }
    .confirm { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; }
    .confirm:hover { transform: scale(1.04); box-shadow: 0 0 25px rgba(34,197,94,0.6); }
    .reject { background: rgba(255,255,255,0.15); color: #fff; }
    .reject:hover { background: rgba(255,255,255,0.25); }
    .secure { margin-top: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.5); }
    .secure::before { content: "🔒 "; }

    /* Ekran ładowania połączenia */
    #connecting {
        position: fixed; inset: 0; background: #001f3f;
        display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
    }
    #connecting.hidden { display: none; }
    .spinner {
        width: 60px; height: 60px; border: 5px solid rgba(255,255,255,0.2);
        border-top-color: #38bdf8; border-radius: 50%;
        animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Ekran sukcesu */
    #success {
        position: fixed; inset: 0; background: linear-gradient(135deg, #14532d, #166534);
        display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 20;
        text-align: center;
    }
    #success.visible { display: flex; animation: fadeIn 0.5s ease; }
    #success .big-check { font-size: 6rem; margin-bottom: 20px; animation: pop 0.5s ease; }
    #success h1 { font-size: 2rem; margin-bottom: 10px; }
    #success p { color: rgba(255,255,255,0.8); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }
</style>
</head>
<body>

<!-- Łączenie -->
<div id="connecting">
    <div class="spinner"></div>
    <p>Łączenie z Bankiem ONL...</p>
</div>

<!-- Karta potwierdzenia -->
<div class="bank-card" id="payment-card" style="display:none;">
    <div class="bank-logo">Bank <span>ONL</span></div>
    <div class="bank-sub">Bezpieczne płatności online</div>

    <div class="detail-row"><span class="label">Odbiorca</span><span class="value">NewOS</span></div>
    <div class="detail-row"><span class="label">Subskrypcja</span><span class="value" id="plan-name">—</span></div>
    <div class="detail-row"><span class="label">Kod klienta</span><span class="value" id="client-code">—</span></div>

    <div class="amount" id="amount">$0</div>

    <div class="question">Czy chcesz potwierdzić płatność?</div>
    <div class="btn-row">
        <button class="reject" id="reject">Odrzuć</button>
        <button class="confirm" id="confirm">Potwierdź płatność</button>
    </div>
    <div class="secure">Połączenie szyfrowane • Bank ONL</div>
</div>

<!-- Sukces -->
<div id="success">
    <div class="big-check">✅</div>
    <h1>Płatność zatwierdzona!</h1>
    <p>Trwa powrót do systemu NewOS...</p>
</div>

<script>
const plan = localStorage.getItem('onl_plan') || 'Nieznany';
const price = localStorage.getItem('onl_price') || '0';
const code = localStorage.getItem('onl_code') || '—';

document.getElementById('plan-name').textContent = plan;
document.getElementById('client-code').textContent = code;
document.getElementById('amount').textContent = '$' + price;

// Symulacja łączenia z bankiem
setTimeout(() => {
    document.getElementById('connecting').classList.add('hidden');
    document.getElementById('payment-card').style.display = 'block';
}, 2000);

// Potwierdzenie płatności
document.getElementById('confirm').addEventListener('click', () => {
    localStorage.setItem('onl_paid', 'true');
    document.getElementById('success').classList.add('visible');
    setTimeout(() => {
        window.location.href = 'index.html';
    }, 2500);
});

// Odrzucenie
document.getElementById('reject').addEventListener('click', () => {
    localStorage.removeItem('onl_paid');
    window.location.href = 'index.html';
});
</script>

</body>
</html>
