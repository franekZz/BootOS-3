<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>NewOS Boot</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #000;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

body.animated-bg {
    background: linear-gradient(135deg, #0a0015, #1a0033, #2d1b69, #6b2fb5, #a855f7, #c084fc);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
}

/* LOGO */
#logo {
    text-align: center;
    opacity: 0;
    transform: scale(0.5);
    animation: logoAppear 1.5s ease-out forwards;
    z-index: 30;
    white-space: nowrap;
    transition: 0.8s;
}

#logo.fade-out {
    opacity: 0;
    transform: scale(1.3);
}

#logo.hidden {
    display: none;
}

.metal-nothing {
    font-family: 'Cherry Bomb One', cursive;
    font-size: 4vw;
    animation: glowPulse 3s infinite;
}

.new-os {
    font-size: 4vw;
    font-weight: 300;
    letter-spacing: 2px;
}

/* PRZEJŚCIE */
#transition-overlay {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    clip-path: circle(0% at 50% 50%);
    background: radial-gradient(circle, #c084fc, #a855f7, #6b2fb5, #2d1b69, #0a0015);
}

#transition-overlay.blooming {
    opacity: 1;
    animation: bloomReveal 2.5s forwards;
}

#flash {
    position: absolute;
    inset: 0;
    z-index: 21;
    opacity: 0;
    pointer-events: none;
    background: radial-gradient(circle, rgba(255,255,255,.9), rgba(192,132,252,.45), transparent 70%);
}

#flash.flashing {
    animation: flashPulse 2.5s forwards;
}

/* EFEKTY */
#effects {
    position: absolute;
    inset: 0;
    z-index: 1;
    opacity: 0;
    overflow: hidden;
    transition: 2s;
}

#effects.visible {
    opacity: 1;
}

.wave {
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    border-radius: 40%;
    background: radial-gradient(circle, rgba(168,85,247,.25), transparent 70%);
    animation: waveRotate 20s linear infinite;
}

.wave:nth-child(2) {
    animation-duration: 26s;
    animation-direction: reverse;
}

.wave:nth-child(3) {
    animation-duration: 32s;
}

.particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(168,85,247,.85), transparent 70%);
    box-shadow: 0 0 25px rgba(168,85,247,.8);
    animation: particleFloat linear infinite;
}

.cloud {
    position: absolute;
    width: 120px;
    height: 40px;
    border-radius: 100px;
    background: rgba(255,255,255,.9);
    cursor: grab;
    z-index: 5;
    box-shadow: 0 0 30px rgba(255,255,255,.5);
    animation: cloudDrift linear infinite;
}

.cloud:before,
.cloud:after {
    content: "";
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,.9);
}

.cloud:before {
    width: 55px;
    height: 55px;
    top: -25px;
    left: 20px;
}

.cloud:after {
    width: 70px;
    height: 70px;
    top: -35px;
    right: 20px;
}

.cloud.dragging {
    animation: none !important;
    z-index: 100;
    cursor: grabbing;
}

/* WYBÓR CZCIONKI */
#font-picker {
    position: absolute;
    top: 50%;
    left: 50%;
    z-index: 40;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(20,5,40,.9);
    border: 2px solid rgba(168,85,247,.6);
    border-radius: 25px;
    padding: 40px 50px;
    opacity: 0;
    pointer-events: none;
    text-align: center;
    transition: 0.6s;
    backdrop-filter: blur(15px);
}

#font-picker.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
}

#font-picker h2 {
    margin-bottom: 30px;
    font-size: 2rem;
}

.font-buttons {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
    justify-content: center;
}

.font-btn {
    padding: 20px 35px;
    border-radius: 15px;
