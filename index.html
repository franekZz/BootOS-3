<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BootOS 3 - Boot</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #000;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

body.animated-bg {
    background: linear-gradient(135deg, #0a0015, #1a0033, #2d1b69, #6b2fb5, #a855f7, #c084fc);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
}

/* LOGO */
#logo {
    text-align: center;
    opacity: 0;
    transform: scale(0.5);
    animation: logoAppear 1.5s ease-out forwards;
    z-index: 30;
    white-space: nowrap;
    transition: 0.8s;
}

#logo.fade-out {
    opacity: 0;
    transform: scale(1.3);
}

#logo.hidden {
    display: none;
}

.metal-nothing {
    font-family: 'Cherry Bomb One', cursive;
    font-size: 4vw;
    animation: glowPulse 3s infinite;
}

.new-os {
    font-size: 4vw;
    font-weight: 300;
    letter-spacing: 2px;
}

/* PRZEJŚCIE */
#transition-overlay {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    clip-path: circle(0% at 50% 50%);
    background: radial-gradient(circle, #c084fc, #a855f7, #6b2fb5, #2d1b69, #0a0015);
}

#transition-overlay.blooming {
    opacity: 1;
    animation: bloomReveal 2.5s forwards;
}

#flash {
    position: absolute;
    inset: 0;
    z-index: 21;
    opacity: 0;
    pointer-events: none;
    background: radial-gradient(circle, rgba(255,255,255,.9), rgba(192,132,252,.45), transparent 70%);
}

#flash.flashing {
    animation: flashPulse 2.5s forwards;
}

/* EFEKTY */
#effects {
    position: absolute;
    inset: 0;
    z-index: 1;
    opacity: 0;
    overflow: hidden;
    transition: 2s;
}

#effects.visible {
    opacity: 1;
}

.wave {
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    border-radius: 40%;
    background: radial-gradient(circle, rgba(168,85,247,.25), transparent 70%);
    animation: waveRotate 20s linear infinite;
}

.wave:nth-child(2) {
    animation-duration: 26s;
    animation-direction: reverse;
}

.wave:nth-child(3) {
    animation-duration: 32s;
}

.particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(168,85,247,.85), transparent 70%);
    box-shadow: 0 0 25px rgba(168,85,247,.8);
    animation: particleFloat linear infinite;
}

.cloud {
    position: absolute;
    width: 120px;
    height: 40px;
    border-radius: 100px;
    background: rgba(255,255,255,.9);
    cursor: grab;
    z-index: 5;
    box-shadow: 0 0 30px rgba(255,255,255,.5);
    animation: cloudDrift linear infinite;
}

.cloud:before,
.cloud:after {
    content: "";
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,.9);
}

.cloud:before {
    width: 55px;
    height: 55px;
    top: -25px;
    left: 20px;
}

.cloud:after {
    width: 70px;
    height: 70px;
    top: -35px;
    right: 20px;
}

.cloud.dragging {
    animation: none !important;
    z-index: 100;
    cursor: grabbing;
}

/* WYBÓR CZCIONKI */
#font-picker {
    position: absolute;
    top: 50%;
    left: 50%;
    z-index: 40;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(20,5,40,.9);
    border: 2px solid rgba(168,85,247,.6);
    border-radius: 25px;
    padding: 40px 50px;
    opacity: 0;
    pointer-events: none;
    text-align: center;
    transition: 0.6s;
    backdrop-filter: blur(15px);
}

#font-picker.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
}

#font-picker h2 {
    margin-bottom: 30px;
    font-size: 2rem;
}

.font-buttons {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
    justify-content: center;
}

.font-btn {
    padding: 20px 35px;
    border-radius: 15px;
    border: 2px solid rgba(168,85,247,.6);
    background: rgba(168,85,247,.15);
    color: white;
    font-size: 1.4rem;
    cursor: pointer;
    transition: 0.3s;
}

.font-btn:hover {
    background: rgba(168,85,247,.4);
    transform: scale(1.05);
}

.font-btn.cherry {
    font-family: 'Cherry Bomb One', cursive;
}

.font-btn small {
    display: block;
    font-size: .8rem;
    opacity: .7;
    margin-top: 8px;
}

/* POWITANIA */
#greeting {
    position: relative;
    z-index: 10;
    font-size: 7vw;
    font-weight: 600;
    opacity: 0;
    text-shadow: 0 0 30px rgba(168,85,247,.9);
    pointer-events: none;
}

#greeting.font-cherry {
    font-family: 'Cherry Bomb One', cursive;
}

#greeting.animate-in {
    animation: greetingIn .7s forwards, textGlow 3s infinite .7s;
}

#greeting.animate-out {
    animation: greetingOut .5s forwards;
}

/* PRZYCISK STRZAŁKI */
#next-btn {
    position: absolute;
    bottom: 6%;
    left: 50%;
    transform: translateX(-50%) scale(.5);
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.7);
    background: rgba(168,85,247,.25);
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: .5s;
}

#next-btn.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) scale(1);
    animation: nextPulse 2s infinite;
}

#next-btn:hover {
    transform: translateX(-50%) scale(1.15);
}

.arrow {
    width: 24px;
    height: 24px;
    border-top: 4px solid white;
    border-right: 4px solid white;
    transform: rotate(45deg);
    margin-left: -6px;
}

/* ANIMACJE */
@keyframes logoAppear {
    0% { opacity: 0; transform: scale(.5); }
    100% { opacity: 1; transform: scale(1); }
}

@keyframes glowPulse {
    50% { text-shadow: 0 0 25px white; }
}

@keyframes gradientShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

@keyframes bloomReveal {
    to { clip-path: circle(150% at 50% 50%); }
}

@keyframes flashPulse {
    30% { opacity: 1; }
    100% { opacity: 0; transform: scale(2); }
}

@keyframes waveRotate {
    to { transform: rotate(360deg); }
}

@keyframes particleFloat {
    0% { transform: translateY(100vh); opacity: 0; }
    10%,90% { opacity: 1; }
    100% { transform: translateY(-100px) translateX(var(--drift)); opacity: 0; }
}

@keyframes cloudDrift {
    from { transform: translateX(-200px); }
    to { transform: translateX(calc(100vw + 200px)); }
}

@keyframes greetingIn {
    0% { opacity: 0; transform: scale(.3); filter: blur(12px); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); }
}

@keyframes greetingOut {
    to { opacity: 0; transform: scale(.5) translateY(-40px); filter: blur(12px); }
}

@keyframes textGlow {
    50% { text-shadow: 0 0 60px #a855f7; }
}

@keyframes nextPulse {
    50% { box-shadow: 0 0 60px #a855f7; }
}
</style>
</head>

<body>

<div id="transition-overlay"></div>
<div id="flash"></div>

<div id="logo">
    <span class="metal-nothing">Metal Nothing</span>
    <span class="new-os">+ NewOS</span>
</div>

<div id="effects">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
</div>

<div id="font-picker">
    <h2>Wybierz czcionkę</h2>
    <div class="font-buttons">
        <button class="font-btn cherry" data-font="cherry">
            Metal Nothing
            <small>Cherry Bomb</small>
        </button>
        <button class="font-btn normal" data-font="normal">
            Normal
            <small>Standardowa</small>
        </button>
    </div>
</div>

<div id="greeting"></div>

<div id="next-btn">
    <div class="arrow"></div>
</div>

<script>
const greetings = [
    "Cześć", "Hello", "你好", "Привет", "Привіт", "Hola", "Bonjour",
    "Hallo", "Ciao", "こんにちは", "안녕하세요", "Olá", "مرحبا", "Merhaba"
];

const logoEl = document.getElementById("logo");
const greetingEl = document.getElementById("greeting");
const bodyEl = document.body;
const effectsEl = document.getElementById("effects");
const fontPickerEl = document.getElementById("font-picker");
const overlayEl = document.getElementById("transition-overlay");
const flashEl = document.getElementById("flash");
const nextBtnEl = document.getElementById("next-btn");

let currentGreetingIndex = 0;

function createParticles() {
    for (let i = 0; i < 25; i++) {
        setTimeout(() => {
            const p = document.createElement("div");
            p.className = "particle";

            const size = Math.random() * 14 + 6;
            p.style.width = size + "px";
            p.style.height = size + "px";
            p.style.left = Math.random() * 100 + "%";
            p.style.setProperty("--drift", (Math.random() - 0.5) * 400 + "px");
            p.style.animationDuration = (Math.random() * 10 + 15) + "s";

            effectsEl.appendChild(p);
        }, i * 160);
    }
}

function createClouds() {
    for (let i = 0; i < 6; i++) {
        const c = document.createElement("div");
        c.className = "cloud";
        c.style.top = (Math.random() * 70 + 8) + "%";
        c.style.animationDuration = (Math.random() * 20 + 25) + "s";
        c.style.animationDelay = (Math.random() * -30) + "s";
        effectsEl.appendChild(c);
        makeDraggable(c);
    }
}

function makeDraggable(cloud) {
    let dragging = false;
    let offsetX = 0;
    let offsetY = 0;

    function start(e) {
        dragging = true;
        cloud.classList.add("dragging");

        const rect = cloud.getBoundingClientRect();
        cloud.style.left = rect.left + "px";
        cloud.style.top = rect.top + "px";
        cloud.style.animation = "none";

        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);

        offsetX = x - rect.left;
        offsetY = y - rect.top;
        e.preventDefault();
    }

    function move(e) {
        if (!dragging) return;

        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);

        cloud.style.left = (x - offsetX) + "px";
        cloud.style.top = (y - offsetY) + "px";
        e.preventDefault();
    }

    function end() {
        dragging = false;
        cloud.classList.remove("dragging");
    }

    cloud.addEventListener("mousedown", start);
    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", end);

    cloud.addEventListener("touchstart", start, { passive: false });
    document.addEventListener("touchmove", move, { passive: false });
    document.addEventListener("touchend", end);
}

/* BOOT */
setTimeout(() => {
    logoEl.classList.add("fade-out");

    setTimeout(() => {
        flashEl.classList.add("flashing");
        overlayEl.classList.add("blooming");
        bodyEl.classList.add("animated-bg");
    }, 700);
}, 6000);

setTimeout(() => {
    logoEl.classList.add("hidden");
    overlayEl.style.opacity = "0";
    effectsEl.classList.add("visible");

    createParticles();
    createClouds();

    setTimeout(() => {
        fontPickerEl.classList.add("visible");
    }, 800);
}, 9200);

/* WYBÓR CZCIONKI */
document.querySelectorAll(".font-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        if (btn.dataset.font === "cherry") {
            greetingEl.classList.add("font-cherry");
        }

        fontPickerEl.classList.remove("visible");

        setTimeout(() => {
            showGreeting();
            setInterval(changeGreeting, 3000);
            nextBtnEl.classList.add("visible");
        }, 700);
    });
});

function showGreeting() {
    greetingEl.textContent = greetings[currentGreetingIndex];
    greetingEl.classList.remove("animate-out");
    greetingEl.classList.add("animate-in");
}

function changeGreeting() {
    greetingEl.classList.remove("animate-in");
    greetingEl.classList.add("animate-out");

    setTimeout(() => {
        currentGreetingIndex = (currentGreetingIndex + 1) % greetings.length;
        greetingEl.textContent = greetings[currentGreetingIndex];
        greetingEl.classList.remove("animate-out");
        greetingEl.classList.add("animate-in");
    }, 500);
}

/* STRZAŁKA - PRZEJŚCIE DO SUBSKRYPCJI */
nextBtnEl.addEventListener("click", () => {
    window.location.href = "subskrypcje.html";
});
</script>
</body>
</html>
