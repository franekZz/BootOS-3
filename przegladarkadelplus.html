<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: transparent; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.browser-bar { padding: 15px; background: rgba(0,0,0,.5); display: flex; gap: 10px; border-bottom: 1px solid rgba(168,85,247,.3); flex-shrink: 0; }
.browser-input { flex: 1; padding: 12px 20px; background: rgba(255,255,255,.1); border: 2px solid rgba(168,85,247,.4); border-radius: 25px; color: white; font-size: 1rem; transition: border-color 0.3s ease; }
.browser-input:focus { outline: none; border-color: #a855f7; }
.browser-btn { padding: 12px 25px; background: linear-gradient(135deg, #a855f7, #c084fc); border: none; border-radius: 25px; color: white; font-weight: 700; cursor: pointer; transition: transform 0.2s ease; }
.browser-btn:hover { transform: scale(1.05); }

.browser-content { flex: 1; padding: 30px; overflow-y: auto; }
.browser-content::-webkit-scrollbar { width: 8px; }
.browser-content::-webkit-scrollbar-track { background: rgba(0,0,0,.2); border-radius: 10px; }
.browser-content::-webkit-scrollbar-thumb { background: rgba(168,85,247,.5); border-radius: 10px; }

.search-result { padding: 20px; background: rgba(168,85,247,.1); border: 2px solid rgba(168,85,247,.3); border-radius: 18px; margin-bottom: 15px; cursor: pointer; transition: background 0.3s ease; }
.search-result:hover { background: rgba(168,85,247,.2); border-color: #a855f7; }
.result-title { font-size: 1.2rem; font-weight: 700; color: #c084fc; margin-bottom: 5px; }
.result-url { font-size: 0.85rem; opacity: 0.6; margin-bottom: 10px; }
.result-desc { font-size: 0.95rem; opacity: 0.8; }

/* LIVERY SETTINGS - W PRZEGLĄDARCE */
.livery-settings-box { background: rgba(30,10,55,.75); border: 2px solid rgba(168,85,247,.45); border-radius: 20px; padding: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
.livery-settings-info { flex: 1; min-width: 250px; }
.livery-settings-info h3 { font-size: 1.4rem; margin-bottom: 10px; color: white; }
.livery-settings-info p { opacity: 0.85; line-height: 1.6; font-size: 1rem; }
.livery-settings-btn { padding: 18px 40px; background: linear-gradient(135deg, #22c55e, #16a34a); border: none; border-radius: 25px; color: white; font-weight: 800; font-size: 1.2rem; cursor: pointer; transition: all 0.3s ease; }
.livery-settings-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(34,197,94,.6); }
.livery-settings-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.modal { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(15px); }
.modal.visible { display: flex; }
.modal-box { width: 90%; max-width: 500px; padding: 40px; background: rgba(20,5,40,.95); border: 2px solid rgba(168,85,247,.7); border-radius: 28px; text-align: center; color: white; box-shadow: 0 20px 60px rgba(0,0,0,.7); }
.modal-box h2 { margin-bottom: 20px; font-size: 1.8rem; }
.modal-box p { margin-bottom: 20px; opacity: 0.85; line-height: 1.6; }
.modal-btn { padding: 15px 40px; border: none; border-radius: 30px; background: linear-gradient(135deg, #a855f7, #c084fc); color: white; font-size: 1rem; font-weight: 800; cursor: pointer; transition: transform 0.2s ease; margin: 5px; }
.modal-btn:hover { transform: scale(1.05); }
.modal-btn.danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
.modal-btn.success { background: linear-gradient(135deg, #22c55e, #16a34a); }

body.special-anims .search-result { animation: resultAppear 0.5s ease-out backwards; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
body.special-anims .search-result:nth-child(1) { animation-delay: 0.1s; }
body.special-anims .search-result:nth-child(2) { animation-delay: 0.2s; }
@keyframes resultAppear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
body.special-anims .search-result:hover { transform: scale(1.03) translateX(10px); box-shadow: 0 5px 20px rgba(168,85,247,.4); }
body.special-anims .search-result { position: relative; overflow: hidden; }
body.special-anims .search-result::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(168,85,247,.2), transparent); transition: left 0.6s; }
body.special-anims .search-result:hover::before { left: 100%; }
body.special-anims .livery-settings-btn { animation: btnPulse 2s infinite; }
@keyframes btnPulse { 0%, 100% { box-shadow: 0 5px 20px rgba(34,197,94,.4); } 50% { box-shadow: 0 10px 40px rgba(34,197,94,.8); } }
</style>
</head>
<body>

<div class="browser-bar">
    <input type="text" class="browser-input" id="browser-search" placeholder="Szukaj w internecie...">
    <button class="browser-btn" onclick="performSearch()">Szukaj</button>
</div>
<div class="browser-content" id="browser-content">
    <h2 style="margin-bottom:20px">Witaj w Hyper Internet!</h2>
    <p style="opacity:0.7">Wpisz coś w wyszukiwarkę aby rozpocząć.</p>
</div>

<!-- MODAL: REJESTR (dla Livery Settings) -->
<div class="modal" id="registry-modal">
    <div class="modal-box">
        <h2>⚠️ Zmiana rejestru</h2>
        <p>Ta operacja zmieni rejestr systemu i zainstaluje usługi tapet. Kontynuować?</p>
        <button class="modal-btn danger" onclick="acceptRegistryChange()">Akceptuję</button>
        <button class="modal-btn" onclick="closeModal('registry-modal')">Anuluj</button>
    </div>
</div>

<script>
const wait = ms => new Promise(resolve => setTimeout(resolve, ms));

let state = {
    metalSecurity: true,
    wallpaperUnlocked: localStorage.getItem("newos_wallpaperUnlocked") === "true",
    specialAnimations: localStorage.getItem("newos_specialAnimations") === "true"
};

window.addEventListener("message", (e) => {
    if (e.data && e.data.type === "state") {
        state = { ...state, ...e.data.state };
        applySpecialAnims();
        updateLiveryBtn();
    }
});
window.parent.postMessage({ type: "getState", from: "browser-iframe" }, "*");
window.addEventListener("storage", (e) => {
    if (e.key.startsWith("newos_")) {
        loadState();
        updateLiveryBtn();
    }
});

function loadState() {
    state.wallpaperUnlocked = localStorage.getItem("newos_wallpaperUnlocked") === "true";
    state.specialAnimations = localStorage.getItem("newos_specialAnimations") === "true";
}

function applySpecialAnims() {
    if (state.specialAnimations) document.body.classList.add("special-anims");
    else document.body.classList.remove("special-anims");
}

function performSearch() {
    const q = document.getElementById("browser-search").value.toLowerCase().trim();
    const c = document.getElementById("browser-content");
    
    if (q.includes("newos block")) {
        c.innerHTML = `
            <h2 style="margin-bottom:20px">Wyniki dla: "${q}"</h2>
            <div class="search-result" onclick="clickFirstLink()">
                <div class="result-title">NewOS BLOCK - Oficjalna strona</div>
                <div class="result-url">https://newos-block.official.com</div>
                <div class="result-desc">Oficjalna strona NewOS BLOCK - Livery Settings i więcej.</div>
            </div>
            <div class="search-result" onclick="clickSecondLink()">
                <div class="result-title">Free Wallpaper Pack 2026</div>
                <div class="result-url">https://free-wallpapers-2026.download/pack</div>
                <div class="result-desc">Najnowsze tapety w wysokiej jakości. Pobierz teraz!</div>
            </div>
            
            <!-- LIVERY SETTINGS - TUTAJ W PRZEGLĄDARCE -->
            <div class="livery-settings-box">
                <div class="livery-settings-info">
                    <h3>⚙️ Livery Settings</h3>
                    <p>Wpłać symboliczne <strong>$3</strong> na rozwój projektu NewOS i odblokuj opcję Animowanej Tapety w Ustawieniach → Wygląd.</p>
                </div>
                <button class="livery-settings-btn" id="livery-settings-btn" onclick="openLiverySettings()">Wpłać $3</button>
            </div>
        `;
        updateLiveryBtn();
    } else {
        c.innerHTML = `<h2>Brak wyników dla "${q}"</h2><p style="opacity:0.7;margin-top:10px">Spróbuj wpisać: newos block</p>`;
    }
}

document.getElementById("browser-search").addEventListener("keypress", e => {
    if (e.key === "Enter") performSearch();
});

function updateLiveryBtn() {
    const btn = document.getElementById("livery-settings-btn");
    if (!btn) return;
    if (state.wallpaperUnlocked) {
        btn.textContent = "✅ Odblokowane";
        btn.disabled = true;
    } else {
        btn.textContent = "Wpłać $3";
        btn.disabled = false;
    }
}

function clickFirstLink() {
    window.parent.postMessage({ type: "securityBlock" }, "*");
}

function clickSecondLink() {
    window.parent.postMessage({ type: "virusDetected" }, "*");
}

// LIVERY SETTINGS - W PRZEGLĄDARCE
function openLiverySettings() {
    if (state.wallpaperUnlocked) {
        window.parent.postMessage({ type: "showToast", text: "Animowane tapety są już odblokowane!" }, "*");
        return;
    }
    document.getElementById("registry-modal").classList.add("visible");
}

function acceptRegistryChange() {
    closeModal("registry-modal");
    runUnlockCMD();
}

async function runUnlockCMD() {
    window.parent.postMessage({ type: "showCMD" }, "*");
    await wait(500);
    
    const cmds = [
        "C:\\Windows\\System32> net stop WallpaperSvc", "Zatrzymano usługę.", "",
        "C:\\> reg add \"HKLM\\SOFTWARE\\NewOS\\Wallpaper\" /v Enabled /t REG_DWORD /d 1 /f", "Operacja ukończona.", "",
        "C:\\> reg add \"HKLM\\SOFTWARE\\NewOS\\Wallpaper\" /v LiveryInstalled /t REG_DWORD /d 1 /f", "Wartość zapisana.", "",
        "C:\\> echo Odblokowano Animowane Tapety!", "Odblokowano Animowane Tapety!", "",
        "C:\\> net start NewOSWallpaper", "Usługa uruchomiona.", "",
        "C:\\> exit"
    ];
    
    for (const l of cmds) {
        window.parent.postMessage({ type: "cmdLine", line: l }, "*");
        await wait(600);
    }
    
    await wait(1500);
    window.parent.postMessage({ type: "hideCMD" }, "*");
    
    state.wallpaperUnlocked = true;
    localStorage.setItem("newos_wallpaperUnlocked", "true");
    updateLiveryBtn();
    
    window.parent.postMessage({ type: "setState", state: { wallpaperUnlocked: true } }, "*");
    window.parent.postMessage({ type: "showToast", text: "✅ Animowane Tapety odblokowane! Włącz je w Ustawieniach → Wygląd." }, "*");
}

function closeModal(id) { document.getElementById(id).classList.remove("visible"); }

applySpecialAnims();
updateLiveryBtn();
</script>
</body>
</html>
